<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple hello world page">
    <title>Hello World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #e2e8f0;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: #1a1a2e;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #2d2d44;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f7fafc;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.125rem;
            color: #a0aec0;
            margin-bottom: 2rem;
        }

        .time-display {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1.5rem;
            color: #667eea;
            background: #0f0f1a;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid #2d2d44;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Hello, World!</h1>
        <p>Welcome to a simple, well-structured HTML page.</p>
        
        <div class="time-display" id="currentTime"></div>
        
        <button id="greetBtn" type="button">Click Me</button>
        
        <footer>
            <p>Built with semantic HTML5, modern CSS, and vanilla JavaScript</p>
        </footer>
    </main>

    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentTime').textContent = now.toLocaleDateString('en-US', options);
        }
        
        // Initial time display
        updateTime();
        // Update every second
        setInterval(updateTime, 1000);

        // Button interaction
        const greetBtn = document.getElementById('greetBtn');
        const greetings = [
            'Hello there! 👋',
            'Hi! Nice to see you! 😊',
            'Greetings! 🌟',
            'Hey! How\'s it going? 👋',
            'Welcome! 🎉'
        ];

        greetBtn.addEventListener('click', () => {
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            greetBtn.textContent = randomGreeting;
            greetBtn.style.background = 'linear-gradient(135deg, #48bb78 0%, #38a169 100%)';
            
            setTimeout(() => {
                greetBtn.textContent = 'Click Me';
                greetBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }, 2000);
        });

        // Keyboard accessibility
        greetBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                greetBtn.click();
            }
        });
    </script>
</body>
</html>
